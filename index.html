<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jassi-CashFlow | Personal Finance Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.8); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">Jassi-CashFlow</h1>
                <p class="text-slate-500 text-sm">Manage your income and expenses</p>
            </div>
            <div class="bg-indigo-100 p-2 rounded-full text-indigo-600">
                <i data-lucide="wallet"></i>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="glass-card p-6 rounded-2xl shadow-sm">
                <p class="text-slate-500 text-sm font-medium mb-1">Total Balance</p>
                <h2 id="total-balance" class="text-3xl font-bold text-slate-800">$0.00</h2>
            </div>
            <div class="glass-card p-6 rounded-2xl shadow-sm border-l-4 border-emerald-500">
                <p class="text-slate-500 text-sm font-medium mb-1 text-emerald-600">Income</p>
                <h2 id="total-income" class="text-3xl font-bold text-slate-800">$0.00</h2>
            </div>
            <div class="glass-card p-6 rounded-2xl shadow-sm border-l-4 border-rose-500">
                <p class="text-slate-500 text-sm font-medium mb-1 text-rose-600">Expenses</p>
                <h2 id="total-expense" class="text-3xl font-bold text-slate-800">$0.00</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-5 gap-8">
            <div class="lg:col-span-2">
                <div class="glass-card p-6 rounded-2xl shadow-sm">
                    <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
                        <i data-lucide="plus-circle" class="w-5 h-5"></i> Add Transaction
                    </h3>
                    <form id="transaction-form" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Description</label>
                            <input type="text" id="description" required placeholder="e.g., Grocery, Salary" 
                                class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Amount ($)</label>
                            <input type="number" id="amount" step="0.01" required placeholder="0.00" 
                                class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Type</label>
                            <div class="flex gap-4">
                                <label class="flex-1">
                                    <input type="radio" name="type" value="income" class="hidden peer" checked>
                                    <div class="text-center p-2 rounded-lg border border-slate-200 cursor-pointer peer-checked:bg-emerald-50 peer-checked:border-emerald-500 peer-checked:text-emerald-700 transition-all">
                                        Income
                                    </div>
                                </label>
                                <label class="flex-1">
                                    <input type="radio" name="type" value="expense" class="hidden peer">
                                    <div class="text-center p-2 rounded-lg border border-slate-200 cursor-pointer peer-checked:bg-rose-50 peer-checked:border-rose-500 peer-checked:text-rose-700 transition-all">
                                        Expense
                                    </div>
                                </label>
                            </div>
                        </div>
                        <button type="submit" class="w-full bg-slate-800 text-white py-3 rounded-lg font-semibold hover:bg-slate-700 transition-colors shadow-lg">
                            Add Entry
                        </button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-3">
                <div class="glass-card p-6 rounded-2xl shadow-sm h-full">
                    <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
                        <i data-lucide="history" class="w-5 h-5"></i> Recent History
                    </h3>
                    <ul id="transaction-list" class="space-y-3 max-h-[400px] overflow-y-auto pr-2">
                        </ul>
                    <div id="empty-state" class="hidden text-center py-10 text-slate-400">
                        <i data-lucide="info" class="w-10 h-10 mx-auto mb-2 opacity-20"></i>
                        <p>No transactions yet.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // App State
        let transactions = JSON.parse(localStorage.getItem('cashflow_data')) || [];

        const form = document.getElementById('transaction-form');
        const list = document.getElementById('transaction-list');
        const emptyState = document.getElementById('empty-state');
        const balanceEl = document.getElementById('total-balance');
        const incomeEl = document.getElementById('total-income');
        const expenseEl = document.getElementById('total-expense');

        // Initialize Lucide Icons
        lucide.createIcons();

        function updateUI() {
            list.innerHTML = '';
            
            if (transactions.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
            }

            let income = 0;
            let expense = 0;

            transactions.forEach(t => {
                const isIncome = t.type === 'income';
                const amount = parseFloat(t.amount);
                
                if (isIncome) income += amount;
                else expense += amount;

                const li = document.createElement('li');
                li.className = 'flex justify-between items-center p-4 rounded-xl border border-slate-100 bg-white shadow-sm hover:shadow-md transition-shadow';
                li.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="p-2 rounded-lg ${isIncome ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}">
                            <i data-lucide="${isIncome ? 'trending-up' : 'trending-down'}" class="w-4 h-4"></i>
                        </div>
                        <div>
                            <p class="font-medium text-slate-800">${t.description}</p>
                            <p class="text-xs text-slate-400">${t.date}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-bold ${isIncome ? 'text-emerald-600' : 'text-rose-600'}">
                            ${isIncome ? '+' : '-'}$${amount.toFixed(2)}
                        </span>
                        <button onclick="removeTransaction(${t.id})" class="text-slate-300 hover:text-rose-500 transition-colors">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                `;
                list.prepend(li);
            });

            const total = income - expense;
            balanceEl.innerText = `$${total.toFixed(2)}`;
            incomeEl.innerText = `$${income.toFixed(2)}`;
            expenseEl.innerText = `$${expense.toFixed(2)}`;
            
            // Re-render icons for new elements
            lucide.createIcons();
            localStorage.setItem('cashflow_data', JSON.stringify(transactions));
        }

        function addTransaction(e) {
            e.preventDefault();
            const desc = document.getElementById('description').value;
            const amt = document.getElementById('amount').value;
            const type = document.querySelector('input[name="type"]:checked').value;

            const transaction = {
                id: Date.now(),
                description: desc,
                amount: amt,
                type: type,
                date: new Date().toLocaleDateString()
            };

            transactions.push(transaction);
            updateUI();
            form.reset();
        }

        window.removeTransaction = function(id) {
            transactions = transactions.filter(t => t.id !== id);
            updateUI();
        }

        form.addEventListener('submit', addTransaction);
        updateUI();
    </script>
</body>
</html>
