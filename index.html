<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CashFlow Pro | Smart Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .glass-card { background: white; border: 1px solid #e2e8f0; }
        .active-filter { background-color: #1e293b !important; color: white !important; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-900 tracking-tight">CashFlow <span class="text-indigo-600">Pro</span></h1>
                <p class="text-slate-500">Visualizing your financial health</p>
            </div>
            
            <div class="flex bg-white p-1 rounded-xl shadow-sm border border-slate-200">
                <button onclick="setFilter('all')" id="filter-all" class="px-4 py-1.5 rounded-lg text-sm font-medium text-slate-600 transition-all active-filter">All</button>
                <button onclick="setFilter('weekly')" id="filter-weekly" class="px-4 py-1.5 rounded-lg text-sm font-medium text-slate-600 transition-all">Weekly</button>
                <button onclick="setFilter('monthly')" id="filter-monthly" class="px-4 py-1.5 rounded-lg text-sm font-medium text-slate-600 transition-all">Monthly</button>
                <button onclick="setFilter('yearly')" id="filter-yearly" class="px-4 py-1.5 rounded-lg text-sm font-medium text-slate-600 transition-all">Yearly</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-2 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="glass-card p-5 rounded-2xl shadow-sm">
                        <p class="text-slate-500 text-xs font-bold uppercase tracking-wider mb-1">Net Balance</p>
                        <h2 id="total-balance" class="text-2xl font-bold text-slate-800">$0.00</h2>
                    </div>
                    <div class="glass-card p-5 rounded-2xl shadow-sm border-b-4 border-emerald-500">
                        <p class="text-emerald-600 text-xs font-bold uppercase tracking-wider mb-1">Total Income</p>
                        <h2 id="total-income" class="text-2xl font-bold text-slate-800">$0.00</h2>
                    </div>
                    <div class="glass-card p-5 rounded-2xl shadow-sm border-b-4 border-rose-500">
                        <p class="text-rose-600 text-xs font-bold uppercase tracking-wider mb-1">Total Expenses</p>
                        <h2 id="total-expense" class="text-2xl font-bold text-slate-800">$0.00</h2>
                    </div>
                </div>

                <div class="glass-card p-6 rounded-2xl shadow-sm">
                    <h3 class="text-lg font-semibold mb-6 flex items-center gap-2">
                        <i data-lucide="bar-chart-3" class="w-5 h-5 text-indigo-600"></i> Cash Flow Analysis
                    </h3>
                    <div class="relative h-[300px]">
                        <canvas id="cashflowChart"></canvas>
                    </div>
                </div>

                <div class="glass-card p-6 rounded-2xl shadow-sm">
                    <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
                        <i data-lucide="list" class="w-5 h-5 text-indigo-600"></i> Transaction History
                    </h3>
                    <div id="transaction-list" class="space-y-3">
                        </div>
                    <div id="empty-state" class="hidden text-center py-10 text-slate-400">
                        <p>No data found for this period.</p>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-1">
                <div class="glass-card p-6 rounded-2xl shadow-sm sticky top-8">
                    <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
                        <i data-lucide="plus-circle" class="w-5 h-5 text-indigo-600"></i> New Transaction
                    </h3>
                    <form id="transaction-form" class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Description</label>
                            <input type="text" id="description" required placeholder="Rent, Groceries, Salary..." 
                                class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Amount ($)</label>
                            <input type="number" id="amount" step="0.01" required placeholder="0.00" 
                                class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Type</label>
                            <div class="flex gap-2">
                                <label class="flex-1 group">
                                    <input type="radio" name="type" value="income" class="hidden peer" checked>
                                    <div class="text-center py-2 rounded-xl border-2 border-slate-100 cursor-pointer peer-checked:border-emerald-500 peer-checked:bg-emerald-50 text-slate-500 peer-checked:text-emerald-700 transition-all font-medium">
                                        Income
                                    </div>
                                </label>
                                <label class="flex-1 group">
                                    <input type="radio" name="type" value="expense" class="hidden peer">
                                    <div class="text-center py-2 rounded-xl border-2 border-slate-100 cursor-pointer peer-checked:border-rose-500 peer-checked:bg-rose-50 text-slate-500 peer-checked:text-rose-700 transition-all font-medium">
                                        Expense
                                    </div>
                                </label>
                            </div>
                        </div>
                        <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 transition-all shadow-md active:scale-95">
                            Add Transaction
                        </button>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <script>
        let transactions = JSON.parse(localStorage.getItem('cashflow_pro_data')) || [];
        let currentFilter = 'all';
        let chartInstance = null;

        const form = document.getElementById('transaction-form');
        const list = document.getElementById('transaction-list');
        const balanceEl = document.getElementById('total-balance');
        const incomeEl = document.getElementById('total-income');
        const expenseEl = document.getElementById('total-expense');

        lucide.createIcons();

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('[id^="filter-"]').forEach(btn => btn.classList.remove('active-filter'));
            document.getElementById(`filter-${filter}`).classList.add('active-filter');
            updateUI();
        }

        function getFilteredData() {
            const now = new Date();
            return transactions.filter(t => {
                const tDate = new Date(t.timestamp);
                if (currentFilter === 'weekly') {
                    const weekAgo = new Date().setDate(now.getDate() - 7);
                    return tDate >= weekAgo;
                } else if (currentFilter === 'monthly') {
                    return tDate.getMonth() === now.getMonth() && tDate.getFullYear() === now.getFullYear();
                } else if (currentFilter === 'yearly') {
                    return tDate.getFullYear() === now.getFullYear();
                }
                return true;
            });
        }

        function updateChart(filteredData) {
            const ctx = document.getElementById('cashflowChart').getContext('2d');
            
            const incomeTotal = filteredData.filter(t => t.type === 'income').reduce((sum, t) => sum + parseFloat(t.amount), 0);
            const expenseTotal = filteredData.filter(t => t.type === 'expense').reduce((sum, t) => sum + parseFloat(t.amount), 0);

            if (chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Income', 'Expenses'],
                    datasets: [{
                        data: [incomeTotal, expenseTotal],
                        backgroundColor: ['#10b981', '#f43f5e'],
                        borderRadius: 8,
                        barThickness: 60
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { display: false } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        function updateUI() {
            const filtered = getFilteredData();
            list.innerHTML = '';
            
            let income = 0;
            let expense = 0;

            filtered.sort((a, b) => b.timestamp - a.timestamp).forEach(t => {
                const isInc = t.type === 'income';
                const amt = parseFloat(t.amount);
                isInc ? income += amt : expense += amt;

                const div = document.createElement('div');
                div.className = 'flex justify-between items-center p-4 bg-slate-50 rounded-xl border border-slate-100 hover:border-indigo-200 transition-all';
                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full flex items-center justify-center ${isInc ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}">
                            <i data-lucide="${isInc ? 'arrow-up-right' : 'arrow-down-right'}" class="w-5 h-5"></i>
                        </div>
                        <div>
                            <p class="font-semibold text-slate-800">${t.description}</p>
                            <p class="text-[10px] text-slate-400 font-bold uppercase">${new Date(t.timestamp).toLocaleDateString()}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-bold ${isInc ? 'text-emerald-600' : 'text-rose-600'}">
                            ${isInc ? '+' : '-'}$${amt.toFixed(2)}
                        </span>
                        <button onclick="deleteEntry(${t.id})" class="text-slate-300 hover:text-rose-500 transition-colors">
                            <i data-lucide="x-circle" class="w-5 h-5"></i>
                        </button>
                    </div>
                `;
                list.appendChild(div);
            });

            document.getElementById('empty-state').style.display = filtered.length === 0 ? 'block' : 'none';
            balanceEl.innerText = `$${(income - expense).toFixed(2)}`;
            incomeEl.innerText = `$${income.toFixed(2)}`;
            expenseEl.innerText = `$${expense.toFixed(2)}`;
            
            updateChart(filtered);
            lucide.createIcons();
            localStorage.setItem('cashflow_pro_data', JSON.stringify(transactions));
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const transaction = {
                id: Date.now(),
                description: document.getElementById('description').value,
                amount: document.getElementById('amount').value,
                type: document.querySelector('input[name="type"]:checked').value,
                timestamp: Date.now()
            };
            transactions.push(transaction);
            form.reset();
            updateUI();
        });

        window.deleteEntry = (id) => {
            transactions = transactions.filter(t => t.id !== id);
            updateUI();
        };

        updateUI();
    </script>
</body>
</html>
